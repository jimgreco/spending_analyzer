name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Transfer files to EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem
          # Sync the webapp folder to the server's spending directory
          rsync -avz -e "ssh -i key.pem -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            webapp/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/spending/webapp/

      - name: Rebuild and Restart Spending
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd ~/deploy && docker-compose build spending && docker-compose up -d spending && docker system prune -f"
